<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Smart Fridge - Connetti Frigorifero</title>
    <link rel="stylesheet" href="../CSS/styleConnetti.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Libreria QR scanner (funziona perfettamente su telefono) -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
</head>
<body>
    <div class="containerSito" style="flex-direction:column; justify-content:center; align-items:center; min-height:100vh; background:#0f0f0f;">
        
        <div class="header" style="width:100%; max-width:1200px; margin-bottom:40px;">
            <div class="header-left">
                <div class="logo-placeholder">
                    <img src="https://via.placeholder.com/48x48/FFD966/121212?text=❄️" alt="Logo">
                    <h1>Smart Fridge</h1>
                </div>
                <p>Collega il tuo frigorifero</p>
            </div>
            <div class="header-right">
                <button onclick="window.location.href='../HTML/registro.html'" class="logout-btn">ESCI</button>
            </div>
        </div>

        <h1 style="font-size:32px; color:#ffd966; text-align:center; margin-bottom:40px;">Connetti al tuo Frigorifero</h1>

        <div class="connect-container">
            <!-- QR con scanner reale -->
            <div class="connect-card">
                <h2>📷 Inquadra QR</h2>
                <p style="margin-bottom:15px;">Usa la fotocamera del telefono</p>
                <div id="qr-reader" style="width:100%; max-width:320px; margin:20px auto; border:5px dashed #ffd966; border-radius:16px; overflow:hidden;"></div>
                <button onclick="startQRScanner()" id="scanBtn" class="registroButton">Avvia Scanner</button>
                <button onclick="stopQRScanner()" id="stopBtn" class="registroButton" style="display:none; background:#e74c3c; margin-top:10px;">Ferma Scanner</button>
            </div>

            <!-- ID Manuale -->
            <div class="connect-card">
                <h2>🔢 Inserisci ID</h2>
                <p style="margin-bottom:20px;">Non riesci a usare la fotocamera?</p>
                <input type="text" id="deviceId" placeholder="ID del frigorifero (es. FRG-987654)" style="width:100%; padding:16px; font-size:16px; border-radius:12px; background:#2a2a2a; border:1px solid #444; color:white; margin-bottom:20px;">
                <button onclick="connectManual()" class="registroButton">Connetti</button>
            </div>
        </div>
    </div>

    <script>
        let html5QrCode = null;

        function startQRScanner() {
            document.getElementById('scanBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'block';

            html5QrCode = new Html5Qrcode("qr-reader");
            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 10, qrbox: { width: 250, height: 250 } },
                (decodedText) => {
                    stopQRScanner();
                    alert('✅ QR scansionato: ' + decodedText);
                    window.location.href = '../HTML/Dashboard.html';
                },
                (error) => { /* silenzioso */ }
            ).catch(err => alert('Errore fotocamera: ' + err));
        }

        function stopQRScanner() {
            if (html5QrCode) html5QrCode.stop().then(() => {
                document.getElementById('scanBtn').style.display = 'block';
                document.getElementById('stopBtn').style.display = 'none';
            });
        }

        function connectManual() {
            const id = document.getElementById('deviceId').value.trim();
            if (id) {
                alert('✅ Connesso al frigorifero ID: ' + id);
                window.location.href = '../HTML/Dashboard.html';
            } else alert('Inserisci un ID valido');
        }
    </script>
</body>
</html>
