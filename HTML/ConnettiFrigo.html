<!DOCTYPE html>
<!--
  CONNETTI FRIGORIFERO - DESKTOP (ConnettiFrigo.html)
  Versione per computer/tablet della pagina di connessione.
  Offre due modalità: scansione tramite QR code (da mostrare al telefono) oppure inserimento manuale dell'ID.
  Include header, logo, tema, logout e nome utente.
-->
<html lang="it">
<head>
    <meta charset="UTF-8">
    <!-- viewport standard: permette lo zoom su desktop -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>NEXORA Smart Fridge - Connetti Frigorifero</title>
    <!-- Foglio di stile per la connessione desktop -->
    <link rel="stylesheet" href="../CSS/styleConnetti.css">
    <!-- Font Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../IMG/logo.png">
    <!-- Script JavaScript per la connessione, tema, logout -->
    <script src="../JS/scriptConnetti.js" defer></script>
</head>
<body>
    <!-- Contenitore principale -->
    <div class="containerSito">
        <!-- Header identico alle altre pagine -->
        <div class="header">
            <div class="header-left">
                <div class="logo-placeholder">
                    <img src="../IMG/logo.png" alt="NEXORA" class="logo-img">
                    <h1>NEXORA Smart Fridge</h1>
                </div>
            </div>
            <div class="header-right">
                <button id="themeToggleBtn" class="theme-toggle-global">☀️</button>
                <!-- Pulsante logout: chiama la funzione logout() definita nello script -->
                <button onclick="logout()" class="logout-btn">ESCI</button>
                <div id="userDisplay" class="user-display">👤 <span id="userNameHeader"></span></div>
            </div>
        </div>

        <!-- Messaggio di benvenuto -->
        <p id="greetingText" class="greeting">Ciao <span id="userNameHeader2"></span>, collega il tuo frigorifero</p>

        <!-- Titolo principale della pagina -->
        <h1 class="page-title">Connetti al tuo Frigorifero</h1>

        <!-- Contenitore a due colonne (grazie al CSS) -->
        <div class="connect-container">
            <!-- Card sinistra: QR code per la connessione tramite telefono -->
            <div class="connect-card">
                <h2>📱 Scansiona dal telefono</h2>
                <p>Usa la fotocamera del tuo telefono per connetterti</p>
                <div class="qr-wrapper">
                    <!-- Immagine statica del QR code che reindirizza alla pagina mobile di connessione -->
                    <img id="qrImage" src="../IMG/QRSitoTelefono.png" alt="QR Code" class="qr-code-img">
                    <p class="qr-hint">Scansiona questo QR con il telefono</p>
                </div>
            </div>

            <!-- Card destra: inserimento manuale ID -->
            <div class="connect-card">
                <h2>🔢 Inserisci ID</h2>
                <p>Non riesci a usare il QR?</p>

                <!-- Contenitore per i messaggi di errore (es. ID vuoto o formato errato) -->
                <div id="errorContainer" class="error-message" style="display:none;"></div>

                <br>
                <!-- Campo input per l'ID del frigorifero (deve iniziare con FRG-) -->
                <input type="text" id="deviceId" placeholder="ID del frigorifero (es. FRG-987654)" class="manual-input">
                <!--
                  Bottone che avvia la connessione manuale.
                  Al click chiama la funzione JavaScript "connectManual()" definita in scriptConnetti.js.
                -->
                <button onclick="connectManual()" class="registroButton">Connetti</button>
            </div>
        </div>
    </div>
</body>
</html>
