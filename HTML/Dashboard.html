<!DOCTYPE html>
<!--
  DASHBOARD DESKTOP (Dashboard.html)
  Versione per computer/tablet della dashboard di controllo.
  Layout a due colonne: modello 3D interattivo a sinistra, metriche, grafico e timeline a destra.
  Supporta modalità admin per selezionare diversi ID frigorifero.
-->
<html lang="it">
<head>
    <meta charset="UTF-8">
    <!-- viewport standard: permette lo zoom su desktop/mobile -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXORA Smart Fridge Dashboard</title>
    <!-- Foglio di stile per la dashboard desktop -->
    <link rel="stylesheet" href="../CSS/styleDashboard.css">
    <!-- Font Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../IMG/logo.png">
    <!-- Chart.js per i grafici -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <!-- Three.js core -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <!-- Loader per modelli GLTF -->
    <script src="https://unpkg.com/three@0.134.0/examples/js/loaders/GLTFLoader.js"></script>
    <!-- Script principale della dashboard -->
    <script src="../JS/scriptDashboard.js" defer></script>
</head>
<body>
    <!-- Contenitore principale a due colonne -->
    <div class="containerSito">
        <!-- Colonna sinistra: modello 3D -->
        <div class="modello3D">
            <!-- Canvas per la scena Three.js -->
            <canvas id="three-canvas"></canvas>
            <!-- Suggerimento interattivo: trascina per ruotare, rotazione automatica -->
            <div class="model-hint">🖱️ Trascina per ruotare • Gira automaticamente</div>
        </div>

        <!-- Colonna destra: contenuti della dashboard -->
        <div class="DashboardContent">
            <!-- Header con logo, tema, logout, nome utente -->
            <div class="header">
                <div class="header-left">
                    <div class="logo-placeholder">
                        <img src="../IMG/logo.png" alt="NEXORA" class="logo-img">
                        <h1>NEXORA Smart Fridge Dashboard</h1>
                    </div>
                </div>
                <div class="header-right">
                    <!-- Pulsante per cambiare tema (scuro/chiaro) -->
                    <button id="themeToggleBtn" class="theme-toggle-global">☀️</button>
                    <!-- Pulsante logout -->
                    <button id="logoutBtn" class="logout-btn">ESCI</button>
                    <!-- Badge con nome utente -->
                    <div id="userDisplay" class="user-display">👤 <span id="userNameHeader"></span></div>

                </div>
            </div>

            <!-- Messaggio di benvenuto -->
            <p id="greetingText" class="greeting">Ciao <span id="userNameHeader2"></span>, monitoraggio in tempo reale</p>

            <!--
              Pannello Admin: visibile solo per utenti admin.
              Contiene un menu a tendina per cambiare l'ID del frigorifero da monitorare.
            -->
            <div id="adminPanel" class="admin-panel" style="display:none;margin-bottom:20px;">
                <label>🔑 Modalità Admin – Seleziona ID Frigorifero</label>
                <!--
                  Select con alcuni ID predefiniti. L'attributo onchange chiama la funzione switchDeviceId()
                  passando il valore selezionato.
                -->
                <select id="adminIdSelect" onchange="switchDeviceId(this.value)" class="admin-select">
                    <option value="FRG-987654">FRG-987654 (Principale)</option>
                    <option value="FRG-111222">FRG-111222 (Cucina 2)</option>
                    <option value="FRG-333444">FRG-333444 (Garage)</option>
                </select>
            </div>

            <!-- Griglia metriche (temperatura, umidità, porta) -->
            <div class="metrics-grid">
                <div class="metric-card">
                    <div class="metric-label">TEMPERATURA</div>
                    <div class="metric-value"><span id="tempValue"></span> <span class="metric-unit">°C</span></div>
                    <div class="metric-trend" id="tempTrend"></div> <!-- trend (es. +0.5°C) -->
                </div>
                <div class="metric-card">
                    <div class="metric-label">UMIDITÀ</div>
                    <div class="metric-value"><span id="humidityValue"></span> <span class="metric-unit">%</span></div>
                    <div class="metric-trend" id="humidityTrend"></div>
                </div>
                <div class="metric-card door" id="doorCard">
                    <div class="metric-label">STATO PORTA</div>
                    <div class="metric-value" id="doorStatus"></div>
                    <div class="metric-trend" id="doorTime"></div>
                </div>
            </div>

            <!-- Sezione grafico -->
            <div class="chart-section">
                <div class="chart-header">
                    <div class="chart-title" id="chartTitle">Storico Temperatura</div>
                    <div class="chart-tabs">
                        <!--
                          Pulsanti per selezionare il tipo di grafico (temperatura o umidità).
                          L'attributo data-type viene usato nello script per capire quale grafico mostrare.
                        -->
                        <button class="chart-tab active" data-type="temperature">Temperatura</button>
                        <button class="chart-tab" data-type="humidity">Umidità</button>
                    </div>
                </div>
                <div class="chart-container" id="chartSwipeArea">
                    <!-- Canvas dove Chart.js disegnerà il grafico -->
                    <canvas id="dataChart"></canvas>
                </div>
            </div>

            <!-- Timeline aperture porta -->
            <div class="timeline-section">
                <div class="timeline-title">Timeline Aperture Porta - Oggi</div>
                <div id="timelineEvents" class="timeline-events"></div>
            </div>
        </div>
    </div>
</body>
</html>
