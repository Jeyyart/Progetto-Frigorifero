<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Accesso NEXORA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            color: #f0f0f0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #1a1a1a;
            border-radius: 28px;
            padding: 30px 25px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .logo-img { width: 70px; margin-bottom: 20px; }
        h2 { color: #22c55e; margin-bottom: 16px; }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 16px;
            font-weight: 600;
            display: none;
        }
        .error { background: rgba(239,68,68,0.2); color: #ef4444; border: 1px solid #ef4444; }
        .loading { background: rgba(34,197,94,0.2); color: #22c55e; border: 1px solid #22c55e; }
        button {
            background: #22c55e;
            color: #111;
            border: none;
            padding: 14px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
        }
        a { color: #22c55e; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <img src="../IMG/logo.png" alt="NEXORA" class="logo-img">
        <h2>Verifica accesso</h2>
        <div id="statusMessage" class="message"></div>
        <div id="actionButton"></div>
    </div>
    <script>
        const PROXY_URL = '/api/verifica';
        const urlParams = new URLSearchParams(window.location.search);
        const fridgeId = urlParams.get('id');

        // Ogni volta che si apre questa pagina, cancelliamo l'utente precedente
        // in modo da richiedere sempre l'accesso
        localStorage.removeItem('currentUser');

        if (!fridgeId || !fridgeId.startsWith('FRG-')) {
            mostraMessaggio("ID frigorifero non valido", "error");
            document.getElementById('actionButton').innerHTML = '<button onclick="window.location.href=\'SelezioneDispositivo.html\'">Torna alla selezione</button>';
        } else {
            avviaVerifica(fridgeId);
        }

        async function avviaVerifica(fridgeId) {
            // Dopo la rimozione, l'utente non è loggato
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));
            
            if (!currentUser) {
                // Salva il redirect e vai al login
                localStorage.setItem('redirectAfterAuth', window.location.href);
                window.location.href = '../HTML/registro.html';
                return;
            }

            if (currentUser.isAdmin === true) {
                window.location.href = `../HTML/DashboardMobile.html?id=${fridgeId}`;
                return;
            }

            mostraMessaggio("Verifica in corso...", "loading");
            try {
                const url = `${PROXY_URL}?userId=${encodeURIComponent(currentUser.email)}&fridgeId=${encodeURIComponent(fridgeId)}`;
                const response = await fetch(url, { method: 'GET' });
                const data = await response.json();
                
                if (data.authorized === true) {
                    window.location.href = `../HTML/DashboardMobile.html?id=${fridgeId}`;
                } else {
                    const errore = data.error || "Non autorizzato";
                    mostraMessaggio(`❌ ${errore}`, "error");
                    document.getElementById('actionButton').innerHTML = '<button onclick="window.location.href=\'SelezioneDispositivo.html\'">Scegli un altro dispositivo</button>';
                }
            } catch (err) {
                console.error(err);
                mostraMessaggio("❌ Errore di connessione al server. Riprova più tardi.", "error");
                document.getElementById('actionButton').innerHTML = '<button onclick="location.reload()">Riprova</button>';
            }
        }

        function mostraMessaggio(msg, tipo) {
            const div = document.getElementById('statusMessage');
            div.textContent = msg;
            div.className = `message ${tipo}`;
            div.style.display = 'block';
        }
    </script>
</body>
</html>
