<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Autorizzazione NEXORA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f0f;
            color: #f0f0f0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: #1a1a1a;
            border-radius: 28px;
            padding: 30px 25px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .logo-img { width: 70px; margin-bottom: 20px; }
        h2 { color: #22c55e; margin-bottom: 16px; }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 16px;
            font-weight: 600;
            display: none;
        }
        .error { background: rgba(239,68,68,0.2); color: #ef4444; border: 1px solid #ef4444; }
        .loading { background: rgba(34,197,94,0.2); color: #22c55e; border: 1px solid #22c55e; }
        button {
            background: #22c55e;
            color: #111;
            border: none;
            padding: 14px 24px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
        }
        a { color: #22c55e; text-decoration: none; }
    </style>
</head>
<body>
    <div class="card">
        <img src="../IMG/logo.png" alt="NEXORA" class="logo-img">
        <h2>Verifica accesso</h2>
        <div id="statusMessage" class="message"></div>
        <div id="actionButton"></div>
    </div>
    <script>
        // ---------- CONFIGURAZIONE ----------
        // 👇 SOSTITUISCI CON LA TUA API DI VERIFICA ASSOCIAZIONE UTENTE-FRIGO
        const API_VERIFICA_ASSOCIAZIONE = "https://tuo-backend.railway.app/api/verificaAssociazione";
        // ------------------------------------

        const urlParams = new URLSearchParams(window.location.search);
        const fridgeId = urlParams.get('id');

        if (!fridgeId || !fridgeId.startsWith('FRG-')) {
            mostraMessaggio("ID frigorifero non valido", "error");
            document.getElementById('actionButton').innerHTML = '<button onclick="window.location.href=\'SelezioneDispositivo.html\'">Torna alla selezione</button>';
        } else {
            // Salva l'ID richiesto per usarlo dopo il login
            localStorage.setItem('pendingFridgeId', fridgeId);
            verificaUtenteEAutorizzazione(fridgeId);
        }

        async function verificaUtenteEAutorizzazione(fridgeId) {
            const currentUser = JSON.parse(localStorage.getItem('currentUser'));

            // Caso 1: utente non loggato
            if (!currentUser) {
                mostraMessaggio("Devi accedere per visualizzare questo frigorifero", "loading");
                // Reindirizza al login, ma con un parametro di ritorno
                localStorage.setItem('redirectAfterLogin', window.location.href);
                window.location.href = '../HTML/registro.html';
                return;
            }

            // Caso 2: utente loggato – verifica autorizzazione
            mostraMessaggio("Controllo autorizzazione in corso...", "loading");

            try {
                // Chiamata API per verificare se l'utente (nickname o email) ha accesso a questo fridgeId
                const response = await fetch(API_VERIFICA_ASSOCIAZIONE, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        userId: currentUser.nickname,   // oppure currentUser.email
                        fridgeId: fridgeId
                    })
                });

                const data = await response.json();

                if (data.authorized === true) {
                    // Autorizzato: vai alla dashboard
                    window.location.href = `../HTML/DashboardMobile.html?id=${fridgeId}`;
                } else {
                    // Non autorizzato
                    mostraMessaggio("❌ Il tuo account non ha accesso a questo frigorifero", "error");
                    document.getElementById('actionButton').innerHTML = '<button onclick="window.location.href=\'SelezioneDispositivo.html\'">Scegli un altro dispositivo</button>';
                }
            } catch (err) {
                console.error(err);
                mostraMessaggio("Errore di verifica. Riprova più tardi.", "error");
                document.getElementById('actionButton').innerHTML = '<button onclick="location.reload()">Riprova</button>';
            }
        }

        function mostraMessaggio(msg, tipo) {
            const div = document.getElementById('statusMessage');
            div.textContent = msg;
            div.className = `message ${tipo}`;
            div.style.display = 'block';
        }
    </script>
</body>
</html>
