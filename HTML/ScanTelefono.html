<!DOCTYPE html>
<!--
  SCAN TELEFONO (ScanTelefono.html)
  Pagina specifica per dispositivi mobili che utilizza la fotocamera per leggere un QR code.
  Il QR code contiene l'ID del frigorifero da connettere.
  Utilizza la libreria html5-qrcode per accedere alla fotocamera e decodificare il QR.
-->
<html lang="it">
<head>
    <meta charset="UTF-8">
    <!--
      viewport ottimizzato per mobile: disabilita lo zoom e si adatta alle aree con notch (viewport-fit=cover).
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEXORA Smart Fridge - Scanner</title>
    <!-- Foglio di stile per la pagina di scansione -->
    <link rel="stylesheet" href="../CSS/styleScanTelefono.css">
    <!-- Font Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../IMG/logo.png">
    <!-- Libreria HTML5-QRCode: permette di leggere QR code dalla webcam -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <!-- Script personalizzato per la gestione dello scanner -->
    <script src="../JS/scriptScanTelefono.js" defer></script>
</head>
<body>
    <!-- Contenitore principale della scansione -->
    <div class="scan-container">
        <!-- Header con logo e nome app -->
        <div class="header-scan">
            <img src="../IMG/logo.png" alt="NEXORA" class="logo-img">
            <h1>NEXORA Smart Fridge</h1>
        </div>

        <!-- Sezione centrale: lettore QR e pulsanti -->
        <div class="scan-main">
            <!-- Riquadro che contiene il flusso video della fotocamera per la scansione -->
            <div class="qr-reader-box">
                <!--
                  Div con ID "qr-reader": verrà utilizzato dalla libreria html5-qrcode per mostrare il video e il riquadro di scansione.
                -->
                <div id="qr-reader"></div>
            </div>
            <!-- Pulsanti di controllo scanner -->
            <div class="scan-controls">
                <!--
                  Pulsante per avviare la fotocamera e iniziare la scansione.
                  Al click chiama la funzione JavaScript "startScanner()" definita in scriptScanTelefono.js.
                -->
                <button onclick="startScanner()" id="scanBtnScan" class="registroButton">📷 Avvia Scanner</button>
                <!--
                  Pulsante per fermare la fotocamera e interrompere la scansione.
                  Inizialmente nascosto (style="display:none;"), viene mostrato dopo l'avvio.
                  Chiama la funzione "stopScanner()".
                -->
                <button onclick="stopScanner()" id="stopBtnScan" class="registroButton stop-btn" style="display:none;">⏹️ Ferma Scanner</button>
            </div>
        </div>

        <!-- Testo informativo per l'utente -->
        <p class="scan-hint">Inquadra il QR del frigorifero</p>
    </div>
</body>
</html>
