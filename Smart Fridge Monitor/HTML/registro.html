<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Fridge - Accedi</title>
    <link rel="stylesheet" href="../CSS/styleRegistro.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="../JS/scriptRegistro.js" defer></script>
</head>
<body>
    <div class="containerRegistro">
        <div class="registroHeader">
            <!-- Logo identico alla Dashboard -->
            <div class="logo-placeholder" style="margin:0 auto 20px; display:flex; align-items:center; gap:12px; justify-content:center;">
                <img src="https://via.placeholder.com/48x48/FFD966/121212?text=❄️" alt="Logo">
                <h1 style="font-size:28px; margin:0;">Smart Fridge</h1>
            </div>
            <p id="registroSubtitle">Accedi al tuo sistema di monitoraggio</p>
        </div>
        <div class="registroForm">
            <div class="RegistroForm">
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="tuo@email.com" required>
            </div>
            <div class="RegistroForm">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <div class="RegistroForm" id="registroConfirmPasswordGroup" style="display: none;">
                <label for="confirmPassword">Conferma Password</label>
                <input type="password" id="confirmPassword" placeholder="••••••••">
            </div>
            <button id="registroButton" class="registroButton">Accedi</button>
            <div class="registroToggle">
                <span id="registroToggleText">Non hai un account? </span>
                <a id="registroToggleLink">Registrati</a>
            </div>
        </div>
    </div>
</body>
</html>
